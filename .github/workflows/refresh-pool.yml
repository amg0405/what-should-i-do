name: Refresh activity pool

on:
  # Weekly cron disabled — pool is large enough not to need automatic refresh.
  # Trigger manually from the Actions tab when you want a fresh batch.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate teen pool
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate:pool teen
      - name: Generate adult pool
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate:pool adult
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore: refresh activity pool"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && exit 0
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            echo "All push attempts failed."
            exit 1
          else
            echo "No changes to pool."
          fi
